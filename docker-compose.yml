version: "3.8"

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: smart-ai-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: smart_ai_internship
      MYSQL_USER: smartai
      MYSQL_PASSWORD: password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - smart-ai-network

  # Redis Cache
  redis:
    image: redis:7.2-alpine
    container_name: smart-ai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - smart-ai-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-ai-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: smart_ai_internship
      DB_USER: smartai
      DB_PASSWORD: password
      DB_SYNC: alter
      AI_SERVICE_URL: http://ai-service:8000
      FRONTEND_URL: http://localhost:3000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - smart-ai-network

  # AI Service
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: smart-ai-ai-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      HOST: 0.0.0.0
      PORT: 8000
      REDIS_URL: redis://redis:6379
      BACKEND_URL: http://backend:5000
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - redis
    volumes:
      - ./ai-service:/app
    networks:
      - smart-ai-network

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-ai-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:5000
      NEXT_PUBLIC_AI_SERVICE_URL: http://localhost:8000
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      - backend
      - ai-service
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - smart-ai-network

volumes:
  mysql_data:
  redis_data:

networks:
  smart-ai-network:
    driver: bridge
